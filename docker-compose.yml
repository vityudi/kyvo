# Stack completa do Kyvo para rodar em qualquer infra propria via Docker.
# Uso: copie apps/api/.env.example para apps/api/.env, preencha os valores, e rode:
#   docker compose --env-file apps/api/.env up --build -d
# (--env-file e necessario porque o .env vive dentro de apps/api, nao na raiz -
# ele alimenta tanto a substituicao de variaveis deste arquivo quanto o
# container "app" via env_file abaixo.)
#
# Servicos:
#   postgres - banco de dados (camada de memoria/RAG usa full-text search nativo, sem extensoes extras)
#   app      - servidor HTTP que recebe o webhook do Telegram, conversa com o Claude
#              e roda os agendamentos (alertas proativos, lembretes, consolidacao de
#              memoria) no mesmo processo via node-cron (ver src/scheduler.ts) -
#              consolidado num unico servico para caber em infra pequena/free tier.
#   caddy    - reverse proxy com TLS automatico (Let's Encrypt), unico servico
#              exposto publicamente (80/443). Precisa de KYVO_DOMAIN em
#              apps/api/.env apontando (DNS) pro IP publico da maquina - ver
#              Caddyfile. Sem dominio proprio, o nip.io resolve isso de graca
#              (ex.: 18-231-252-111.nip.io para o IP 18.231.252.111).

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - kyvo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Nao exponha a porta publicamente em producao - descomente so para
    # depurar localmente com um client de Postgres na sua maquina.
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"

  app:
    build: .
    command: ["node", "dist/server.js"]
    restart: unless-stopped
    env_file:
      - apps/api/.env
    environment:
      POSTGRES_HOST: postgres
    # Nao exponha ao host/publico - so o "caddy" fala com o "app" (rede
    # interna do compose). Descomente so para depurar localmente sem TLS.
    # ports:
    #   - "${PORT:-3000}:3000"
    volumes:
      - kyvo_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      KYVO_DOMAIN: ${KYVO_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - kyvo_caddy_data:/data
      - kyvo_caddy_config:/config
    depends_on:
      app:
        condition: service_healthy

volumes:
  kyvo_postgres_data:
  kyvo_uploads:
  kyvo_caddy_data:
  kyvo_caddy_config:
